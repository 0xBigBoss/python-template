[project]
name = "utils"
version = "0.0.0"
description = "Utility library"
requires-python = ">=3.13"
license = "MIT"
dependencies = ["core"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/utils"]

[tool.uv.sources]
core = { workspace = true }
