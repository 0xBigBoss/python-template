pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.py"
      run: uv run ruff check {staged_files}
    format:
      glob: "*.py"
      run: uv run ruff format --check {staged_files}
    typecheck:
      glob: "*.py"
      run: uv run ty check

pre-push:
  parallel: true
  commands:
    lint:
      run: uv run ruff check .
    format:
      run: uv run ruff format --check .
    typecheck:
      run: uv run ty check
    test:
      run: uv run pytest
